name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: clf-x86_64-unknown-linux-gnu.tar.gz
            bin_name: clf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: clf-x86_64-pc-windows-msvc.zip
            bin_name: clf.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} --bin clf

      - name: Package Linux archive
        if: runner.os == 'Linux'
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" .
          cp "scripts/install.sh" ./install.sh
          tar -czf "${{ matrix.archive_name }}" "${{ matrix.bin_name }}" install.sh

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" ".\${{ matrix.bin_name }}"
          Copy-Item "scripts/install.ps1" ".\install.ps1"
          Compress-Archive -Path ".\${{ matrix.bin_name }}", ".\install.ps1" -DestinationPath ".\${{ matrix.archive_name }}" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum clf-*.tar.gz clf-*.zip > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            dist/clf-*.tar.gz
            dist/clf-*.zip
            dist/SHA256SUMS
          generate_release_notes: true
